name: tera_ai
description: 파충류 사육자를 위한 올인원 앱
publish_to: 'none'
version: 0.10.1+20

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  easy_localization: ^3.0.7+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  infinite_scroll_pagination: ^4.1.0
  intl: ^0.20.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  supabase_flutter: ^2.0.0
  flutter_blue_plus: ^2.3.8
  permission_handler: ^12.0.3
  flutter_webrtc: ^1.4.1
  package_info_plus: ^10.2.0
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/l10n/
    - assets/data/
    - assets/data/care_info/
    - assets/data/morphs/
    - assets/images/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#1B5E20"
  image: assets/images/logo.png
  android_12:
    color: "#1B5E20"
    image: assets/images/logo.png
